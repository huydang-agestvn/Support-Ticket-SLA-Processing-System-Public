basePath: /api/v1
definitions:
  domain.Priority:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - PriorityLow
    - PriorityMedium
    - PriorityHigh
  domain.TicketStatus:
    enum:
    - new
    - assigned
    - in_progress
    - resolved
    - closed
    - cancelled
    type: string
    x-enum-varnames:
    - StatusNew
    - StatusAssigned
    - StatusInProgress
    - StatusResolved
    - StatusClosed
    - StatusCancelled
  dto.CreateTicketReq:
    properties:
      description:
        maxLength: 5000
        type: string
      priority:
        $ref: '#/definitions/domain.Priority'
      requestor_id:
        type: string
      title:
        maxLength: 255
        minLength: 5
        type: string
    required:
    - priority
    - requestor_id
    - title
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.UpdateStatusReq:
    properties:
      assignee_id:
        type: string
      note:
        type: string
      status:
        $ref: '#/definitions/domain.TicketStatus'
    type: object
host: localhost:8080
info:
  contact: {}
  description: API documentation for Support Ticket SLA Processing System.
  title: Support Ticket SLA Processing System API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with username and password through Keycloak
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid username or password
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - Auth
  /ticket-events/import:
    post:
      consumes:
      - application/json
      description: Import ticket events in batch using worker pool
      parameters:
      - description: Import ticket events request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Import ticket events
      tags:
      - ticket-events
  /tickets:
    get:
      description: Get a list of support tickets with optional filters by status,
        priority and assignee ID.
      parameters:
      - description: Filter by ticket status
        enum:
        - new
        - assigned
        - in_progress
        - resolved
        - closed
        - cancelled
        in: query
        name: status
        type: string
      - description: Filter by ticket priority
        enum:
        - low
        - medium
        - high
        - urgent
        in: query
        name: priority
        type: string
      - description: Filter by assignee ID
        in: query
        name: assignee_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List tickets successfully
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: List tickets
      tags:
      - Tickets
    post:
      consumes:
      - application/json
      description: Create a new support ticket with title, description, requestor,
        assignee and priority.
      parameters:
      - description: Create ticket request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTicketReq'
      produces:
      - application/json
      responses:
        "201":
          description: Ticket created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or invalid priority
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new ticket
      tags:
      - Tickets
  /tickets/{id}:
    get:
      description: Get support ticket detail by ticket ID.
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get ticket detail successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ticket ID format
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Ticket not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get ticket detail
      tags:
      - Tickets
  /tickets/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update support ticket status by ticket ID. The status transition
        must follow the required ticket status flow.
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update ticket status request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: Ticket status updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body, invalid ticket ID or invalid status transition
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Ticket not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Update ticket status
      tags:
      - Tickets
swagger: "2.0"
